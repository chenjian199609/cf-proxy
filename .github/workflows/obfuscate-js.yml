name: JS纯混淆 隐藏代理关键词 无替换不报错
on:
  push:
    branches: [ main ]
    paths:
      - snippets.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 安装工具
        run: npm install -g javascript-obfuscator terser

      - name: 校验原始JS语法
        run: |
          test -f snippets.js || (echo "缺失 snippets.js" && exit 1)
          node -c snippets.js
          ls -lh snippets.js

      # 仅靠混淆加密所有字符串，不需要前置替换，不会破坏代码语法
      - name: JS混淆 RC4加密全部字符串
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --string-array true \
            --string-array-encoding rc4 \
            --string-array-shuffle false \
            --control-flow-flattening false \
            --rename-globals false \
            --rename-properties false \
            --numbers-to-expressions false \
            --output snippets.obf.js

      # 压缩控体积
      - name: Terser压缩瘦身
        run: |
          terser snippets.obf.js -o snippets.obf.js \
            -c drop_console=true,dead_code=true \
            -m toplevel=true

      - name: 打印文件大小
        run: ls -lh snippets.obf.js

      - name: 提交推送混淆文件
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Obfuscate hide proxy keywords [skip ci]"
            git push
          else
            echo "无变更，跳过提交"
          fi
