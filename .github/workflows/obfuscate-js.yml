name: JS混淆-保留网页 控体积隐藏代理关键词
on:
  push:
    branches: [ main ]
    paths:
      - snippets.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 安装混淆+压缩工具
        run: npm install -g javascript-obfuscator terser

      - name: 校验源文件存在与JS语法
        run: |
          test -f snippets.js || (echo "ERROR: 缺失 snippets.js" && exit 1)
          node -c snippets.js
          echo "原始文件大小:"
          ls -lh snippets.js

      # 核心混淆配置：仅加密字符串，关闭体积膨胀参数，无废弃flag
      - name: JS混淆（完整保留网页逻辑，加密所有敏感字符串）
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --string-array true \
            --string-array-encoding rc4 \
            --string-array-shuffle false \
            --control-flow-flattening false \
            --rename-globals false \
            --rename-properties false \
            --numbers-to-expressions false \
            --output snippets.obf.js

      # Terser极致压缩抵消字符串数组带来的体积增量，防止超32KB
      - name: 轻量压缩（不压缩模板字符串）
        run: |
          terser snippets.obf.js -o snippets.obf.js \
            -c drop_console=false,dead_code=true,unsafe_strings=false \
            -m toplevel=false

      - name: 输出混淆后文件大小
        run: ls -lh snippets.obf.js

      # 自动提交混淆产物，[skip ci] 防止循环触发CI
      - name: Commit & Push 混淆文件
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Obfuscate JS, keep web page function [skip ci]"
            git push
          else
            echo "文件无变更，跳过提交"
          fi
