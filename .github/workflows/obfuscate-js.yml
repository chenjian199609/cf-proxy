name: JS混淆-保留源码生成独立混淆文件
on:
  push:
    branches: [ main ] # 修改为你的分支
    paths:
      - 'snippets.js'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      # 本地安装依赖，不再全局安装
      - name: 安装依赖
        run: npm install

      # 通过 npx 调用本地的 javascript-obfuscator
      - name: 混淆源码输出独立文件 snippets.obf.js
        run: |
          npx javascript-obfuscator snippets.js \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 0.8 \
            --string-array true \
            --string-array-encoding base64 \
            --string-array-shuffle true \
            --rename-globals true \
            --rename-properties true \
            --rotate-string-array true \
            --numbers-to-expressions true \
            --output snippets.obf.js

      - name: 提交推送混淆产物
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Auto generate obfuscated snippets.obf.js [skip ci]"
            git push
          else
            echo "混淆文件无变动，跳过提交"
          fi
