name: JS混淆-保留源码输出独立混淆文件
on:
  push:
    branches: [ main ] # 替换你的分支
    paths:
      - 'snippets.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # 这里彻底删除 cache 整一行，不再触发 lock 文件检测

      - name: 全局安装混淆工具
        run: npm install -g javascript-obfuscator

      - name: 混淆生成独立文件 snippets.obf.js
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 0.8 \
            --string-array true \
            --string-array-encoding base64 \
            --string-array-shuffle true \
            --rename-globals true \
            --rename-properties true \
            --rotate-string-array true \
            --numbers-to-expressions true \
            --output snippets.obf.js

      - name: 自动提交推送混淆文件
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Auto generate obfuscated snippets.obf.js [skip ci]"
            git push
          else
            echo "混淆文件无变更，跳过提交"
          fi
