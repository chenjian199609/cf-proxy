name: JS混淆-隐藏代理节点关键词 控体积
on:
  push:
    branches: [ main ]
    paths:
      - snippets.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 安装工具
        run: npm install -g javascript-obfuscator terser

      - name: 校验原始JS语法
        run: |
          test -f snippets.js || (echo "错误：缺少 snippets.js" && exit 1)
          node -c snippets.js
          echo "原始文件大小："
          ls -lh snippets.js

      # 方案：使用node脚本安全替换敏感词，不会破坏JS语法，替代危险sed
      - name: Node脚本替换 v2ray/clash/proxy 等敏感关键词
        run: |
          cat > replace.js << 'EOF'
          const fs = require('fs');
          let code = fs.readFileSync('snippets.js', 'utf8');
          // 待混淆关键词映射：完整词拆分为字符串拼接
          const replaceMap = {
            "v2ray": '"v"+"2"+"r"+"a"+"y"',
            "clash": '"c"+"l"+"a"+"s"+"h"',
            "proxy": '"p"+"r"+"o"+"x"+"y"',
            "vmess": '"v"+"m"+"e"+"s"+"s"',
            "vless": '"v"+"l"+"e"+"s"+"s"',
            "trojan": '"t"+"r"+"o"+"j"+"a"+"n"',
            "shadowsocks": '"s"+"h"+"a"+"d"+"o"+"w"+"s"+"o"+"c"+"k"+"s"',
            "ss": '"s"+"s"',
            "socks": '"s"+"o"+"c"+"k"+"s"',
            "node": '"n"+"o"+"d"+"e"',
            "server": '"s"+"e"+"r"+"v"+"e"+"r"',
            "port": '"p"+"o"+"r"+"t"',
            "ws": '"w"+"s"',
            "tcp": '"t"+"c"+"p"',
            "udp": '"u"+"d"+"p"',
            "tls": '"t"+"l"+"s"',
            "grpc": '"g"+"r"+"p"+"c"'
          };
          // 批量全局替换
          Object.keys(replaceMap).forEach(key => {
            const reg = new RegExp(key, 'g');
            code = code.replace(reg, replaceMap[key]);
          });
          fs.writeFileSync('snippets.tmp.js', code, 'utf8');
          EOF
          node replace.js
          # 替换临时文件
          mv snippets.tmp.js snippets.js
          # 替换后再次校验语法，提前捕获错误
          node -c snippets.js

      # 轻量混淆，rc4字符串加密，关闭所有膨胀参数防超32kb
      - name: JS混淆（无废弃参数，稳定运行）
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --string-array true \
            --string-array-encoding rc4 \
            --string-array-shuffle false \
            --control-flow-flattening false \
            --rename-globals false \
            --rename-properties false \
            --numbers-to-expressions false \
            --output snippets.obf.js

      # 压缩减小体积
      - name: Terser二次压缩
        run: |
          terser snippets.obf.js -o snippets.obf.js \
            -c drop_console=true,dead_code=true \
            -m toplevel=true

      - name: 输出最终文件大小
        run: ls -lh snippets.obf.js

      - name: 提交推送混淆文件
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Hide proxy keyword + obfuscate [skip ci]"
            git push
          else
            echo "文件无变更，跳过提交"
          fi
