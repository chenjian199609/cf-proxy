name: JS轻量混淆 输出独立snippets.obf.js
on:
  push:
    branches: [ main ] # 修改为你的分支
    paths:
      - snippets.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 安装混淆工具
        run: npm install -g javascript-obfuscator

      - name: 检查文件
        run: |
          ls -la
          if [ ! -f "snippets.js" ]; then
            echo "ERROR: 缺失源文件 snippets.js"
            exit 1
          fi
          echo "源文件大小:"
          ls -lh snippets.js

      # 【轻量化低体积混淆，无膨胀参数】
      # 关闭控制流扁平化、属性重命名、数字表达式等高体积选项
      - name: 执行混淆
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --string-array true \
            --string-array-encoding base64 \
            --string-array-shuffle false \
            --rename-globals false \
            --control-flow-flattening false \
            --numbers-to-expressions false \
            --output snippets.obf.js

      - name: 打印混淆后文件大小
        run: ls -lh snippets.obf.js

      # 提交推送
      - name: Commit & Push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Light obfuscate snippets.obf.js [skip ci]"
            git push
          else
            echo "文件无变化，跳过提交"
          fi
