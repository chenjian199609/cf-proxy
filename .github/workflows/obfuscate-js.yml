name: JS混淆-保留网页 无terser防报错
on:
  push:
    branches: [ main ]
    paths:
      - snippets.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: 仅安装混淆器（不再装terser）
        run: npm install -g javascript-obfuscator

      - name: 校验源文件语法
        run: |
          test -f snippets.js || (echo "缺失snippets.js" && exit 1)
          node -c snippets.js
          ls -lh snippets.js

      # 轻量化混淆：仅加密敏感字符串，不破坏HTML页面模板
      - name: JS混淆生成snippets.obf.js
        run: |
          javascript-obfuscator snippets.js \
            --compact true \
            --string-array true \
            --string-array-encoding rc4 \
            --string-array-shuffle false \
            --control-flow-flattening false \
            --rename-globals false \
            --rename-properties false \
            --numbers-to-expressions false \
            --output snippets.obf.js

      - name: 输出混淆文件大小
        run: ls -lh snippets.obf.js

      - name: 提交混淆文件
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add snippets.obf.js
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "Obfuscate keep web page [skip ci]"
            git push
          fi
